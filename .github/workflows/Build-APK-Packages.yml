name: Build and publish APK packages

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: publish-apk-packages
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: apk-packages
      SDK_BASE_URL: https://downloads.immortalwrt.org/snapshots/targets/qualcommax/ipq60xx
    steps:
      - name: Checkout package repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve packages to build
        id: packages
        env:
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          mapfile -t all_packages < <(
            find . -mindepth 2 -maxdepth 2 -type f -name Makefile \
              -printf '%h\n' |
              sed 's#^\./##' |
              awk -F / '$1 !~ /^\./' |
              sort -u
          )
          selected_packages=()

          if [[ "$GITHUB_EVENT_NAME" == 'workflow_dispatch' ]]; then
            selected_packages=("${all_packages[@]}")
          else
            if [[ -z "$BEFORE_SHA" ]] || [[ "$BEFORE_SHA" =~ ^0+$ ]]; then
              mapfile -t changed_files < <(
                git show --format= --name-only "$GITHUB_SHA"
              )
            else
              mapfile -t changed_files < <(
                git diff --name-only "$BEFORE_SHA" "$GITHUB_SHA"
              )
            fi

            for package in "${all_packages[@]}"; do
              for path in "${changed_files[@]}"; do
                if [[ "$path" == "$package/"* ]]; then
                  selected_packages+=("$package")
                  break
                fi
              done
            done
          fi

          if (( ${#selected_packages[@]} == 0 )); then
            echo 'changed=false' >> "$GITHUB_OUTPUT"
            echo 'No package changes were detected.' >> "$GITHUB_STEP_SUMMARY"
          else
            printf '%s\n' "${selected_packages[@]}" > "$RUNNER_TEMP/selected-packages.txt"
            packages_csv="$(IFS=,; echo "${selected_packages[*]}")"
            echo 'changed=true' >> "$GITHUB_OUTPUT"
            echo "packages=$packages_csv" >> "$GITHUB_OUTPUT"
            echo "### APK packages: $packages_csv" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Install SDK dependencies
        if: steps.packages.outputs.changed == 'true'
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get -qq update
          sudo apt-get -qq install --no-install-recommends \
            build-essential clang flex bison g++ gawk gettext git \
            libelf-dev libncurses-dev libssl-dev python3 python3-setuptools \
            rsync swig time unzip wget xsltproc zlib1g-dev zstd

      - name: Maintain selected package sources
        if: steps.packages.outputs.changed == 'true'
        run: |
          mapfile -t selected_packages < "$RUNNER_TEMP/selected-packages.txt"
          .github/scripts/fix-package-permissions.sh "${selected_packages[@]}"
          .github/scripts/rescan-translations.sh "${selected_packages[@]}"
          git diff --check

      - name: Resolve ImmortalWrt SDK
        if: steps.packages.outputs.changed == 'true'
        id: sdk
        run: |
          sums_file="$RUNNER_TEMP/immortalwrt-sha256sums"
          curl -fsSL --retry 3 "$SDK_BASE_URL/sha256sums" -o "$sums_file"
          archive="$(awk '
            $2 ~ /^\*?immortalwrt-sdk-qualcommax-ipq60xx_.*\.Linux-x86_64\.tar\.zst$/ {
              sub(/^\*/, "", $2)
              print $2
              exit
            }
          ' "$sums_file")"
          [[ -n "$archive" ]]
          sha256="$(awk -v name="*$archive" '$2 == name { print $1; exit }' "$sums_file")"
          [[ -n "$sha256" ]]
          echo "archive=$archive" >> "$GITHUB_OUTPUT"
          echo "sha256=$sha256" >> "$GITHUB_OUTPUT"

      - name: Cache ImmortalWrt SDK
        if: steps.packages.outputs.changed == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/immortalwrt-sdk
          key: immortalwrt-sdk-qualcommax-ipq60xx-${{ steps.sdk.outputs.sha256 }}

      - name: Download and extract ImmortalWrt SDK
        if: steps.packages.outputs.changed == 'true'
        env:
          SDK_ARCHIVE: ${{ steps.sdk.outputs.archive }}
          SDK_SHA256: ${{ steps.sdk.outputs.sha256 }}
        run: |
          cache_dir="$HOME/.cache/immortalwrt-sdk"
          archive_path="$cache_dir/$SDK_ARCHIVE"
          extract_dir="$RUNNER_TEMP/immortalwrt-sdk"
          mkdir -p "$cache_dir"

          if [[ ! -f "$archive_path" ]] || \
             [[ "$(sha256sum "$archive_path" | cut -d' ' -f1)" != "$SDK_SHA256" ]]; then
            rm -f "$archive_path"
            curl -fL --retry 3 "$SDK_BASE_URL/$SDK_ARCHIVE" -o "$archive_path"
          fi

          echo "$SDK_SHA256  $archive_path" | sha256sum -c -
          rm -rf "$extract_dir"
          mkdir -p "$extract_dir"
          tar --zstd -xf "$archive_path" -C "$extract_dir"
          sdk_root="$(find "$extract_dir" -mindepth 1 -maxdepth 1 \
            -type d -name 'immortalwrt-sdk-*' -print -quit)"
          [[ -n "$sdk_root" ]]
          echo "SDK_ROOT=$sdk_root" >> "$GITHUB_ENV"

      - name: Cache package sources
        if: steps.packages.outputs.changed == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/immortalwrt-dl
          key: immortalwrt-dl-qualcommax-ipq60xx-${{ hashFiles('**/Makefile') }}
          restore-keys: |
            immortalwrt-dl-qualcommax-ipq60xx-

      - name: Prepare package feeds
        if: steps.packages.outputs.changed == 'true'
        run: |
          mkdir -p "$HOME/.cache/immortalwrt-dl"
          rm -rf "$SDK_ROOT/dl"
          ln -s "$HOME/.cache/immortalwrt-dl" "$SDK_ROOT/dl"
          "$SDK_ROOT/scripts/feeds" update -a
          "$SDK_ROOT/scripts/feeds" install -a

      - name: Build selected APK packages
        if: steps.packages.outputs.changed == 'true'
        run: |
          mapfile -t selected_packages < "$RUNNER_TEMP/selected-packages.txt"
          .github/scripts/build-apk-packages.sh \
            "$SDK_ROOT" \
            "$RUNNER_TEMP/apk-output" \
            "${selected_packages[@]}"

      - name: Publish fixed-tag release
        if: steps.packages.outputs.changed == 'true'
        env:
          PACKAGES: ${{ steps.packages.outputs.packages }}
        run: |
          output_dir="$RUNNER_TEMP/apk-output"
          notes_file="$RUNNER_TEMP/apk-release-notes.md"
          assets=()
          while IFS=$'\t' read -r filename package_name _ _; do
            assets+=("$output_dir/$filename#package:$package_name")
          done < "$output_dir/APK-MANIFEST.tsv"
          (( ${#assets[@]} > 0 ))

          {
            echo 'ImmortalWrt APK 插件包固定发布。'
            echo
            echo "本次编译：$PACKAGES"
            echo "源提交：$GITHUB_SHA"
            echo
            echo '每个 APK 包名仅保留最近 3 个版本。'
          } > "$notes_file"

          if gh release view "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${assets[@]}" \
              --repo "$GITHUB_REPOSITORY" --clobber
            gh release edit "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title 'ImmortalWrt APK 插件包' \
              --notes-file "$notes_file" \
              --prerelease=false
          else
            gh release create "$RELEASE_TAG" "${assets[@]}" \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title 'ImmortalWrt APK 插件包' \
              --notes-file "$notes_file"
          fi

      - name: Keep three versions per package
        if: steps.packages.outputs.changed == 'true'
        run: .github/scripts/prune-apk-release.sh "$RELEASE_TAG" 3
