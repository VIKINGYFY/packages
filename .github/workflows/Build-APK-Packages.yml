name: 编译并发布 APK 软件包

on:
  workflow_dispatch:
    inputs:
      packages:
        description: 留空编译全部软件包；CI 可填写逗号分隔的软件包目录
        required: false
        type: string
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: publish-apk-packages
  cancel-in-progress: false

jobs:
  resolve:
    name: 确定需要编译的软件包
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.packages.outputs.changed }}
      packages: ${{ steps.packages.outputs.packages }}
      packages_display: ${{ steps.packages.outputs.packages_display }}
    steps:
      - name: 检出软件包仓库
        uses: actions/checkout@main
        with:
          fetch-depth: 0

      - name: 确定需要编译的软件包
        id: packages
        env:
          BEFORE_SHA: ${{ github.event.before }}
          REQUESTED_PACKAGES: ${{ inputs.packages }}
        run: |
          .github/scripts/resolve-build-packages.sh \
            "$GITHUB_EVENT_NAME" "$BEFORE_SHA" "$REQUESTED_PACKAGES"

  build:
    name: 编译 ${{ matrix.platform_name }} APK
    needs: resolve
    if: needs.resolve.outputs.changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: arm64
            platform_name: ARM64
            sdk_path: qualcommax/ipq60xx
            sdk_prefix: immortalwrt-sdk-qualcommax-ipq60xx_
            target: qualcommax
            subtarget: ipq60xx
          - platform: amd64
            platform_name: AMD64
            sdk_path: x86/64
            sdk_prefix: immortalwrt-sdk-x86-64_
            target: x86
            subtarget: '64'
    env:
      SDK_BASE_URL: https://downloads.immortalwrt.org/snapshots/targets/${{ matrix.sdk_path }}
      SDK_ARCHIVE_PREFIX: ${{ matrix.sdk_prefix }}
    steps:
      - name: 检出软件包仓库
        uses: actions/checkout@main

      - name: 安装 SDK 依赖
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get -qq update
          sudo apt-get -qq install --no-install-recommends \
            build-essential clang flex bison g++ gawk gettext git \
            libelf-dev libncurses-dev libssl-dev python3 python3-setuptools \
            rsync swig time unzip wget xsltproc zip zlib1g-dev zstd

      - name: 维护软件包源码
        env:
          PACKAGES: ${{ needs.resolve.outputs.packages }}
        run: |
          IFS=',' read -ra selected_packages <<< "$PACKAGES"
          .github/scripts/fix-package-permissions.sh "${selected_packages[@]}"
          .github/scripts/rescan-translations.sh "${selected_packages[@]}"
          git diff --check

      - name: 确定 ImmortalWrt SDK
        id: sdk
        run: |
          sums_file="$RUNNER_TEMP/immortalwrt-sha256sums"
          curl -fsSL --retry 3 "$SDK_BASE_URL/sha256sums" -o "$sums_file"
          archive=''
          sha256=''
          while read -r sum name; do
            name="${name#\*}"
            if [[ "$name" == "$SDK_ARCHIVE_PREFIX"*'.Linux-x86_64.tar.zst' ]]; then
              archive="$name"
              sha256="$sum"
              break
            fi
          done < "$sums_file"
          [[ -n "$archive" && -n "$sha256" ]]
          echo "archive=$archive" >> "$GITHUB_OUTPUT"
          echo "sha256=$sha256" >> "$GITHUB_OUTPUT"

      - name: 缓存 ImmortalWrt SDK
        uses: actions/cache@main
        with:
          path: ~/.cache/immortalwrt-sdk/${{ matrix.platform }}
          key: immortalwrt-sdk-${{ matrix.platform }}-${{ steps.sdk.outputs.sha256 }}

      - name: 下载并解压 ImmortalWrt SDK
        env:
          SDK_ARCHIVE: ${{ steps.sdk.outputs.archive }}
          SDK_SHA256: ${{ steps.sdk.outputs.sha256 }}
        run: |
          cache_dir="$HOME/.cache/immortalwrt-sdk/${{ matrix.platform }}"
          archive_path="$cache_dir/$SDK_ARCHIVE"
          extract_dir="$RUNNER_TEMP/immortalwrt-sdk"
          mkdir -p "$cache_dir"

          if [[ ! -f "$archive_path" ]] || \
             [[ "$(sha256sum "$archive_path" | cut -d' ' -f1)" != "$SDK_SHA256" ]]; then
            rm -f "$archive_path"
            curl -fL --retry 3 "$SDK_BASE_URL/$SDK_ARCHIVE" -o "$archive_path"
          fi

          echo "$SDK_SHA256  $archive_path" | sha256sum -c -
          rm -rf "$extract_dir"
          mkdir -p "$extract_dir"
          tar --zstd -xf "$archive_path" -C "$extract_dir"
          sdk_root="$(find "$extract_dir" -mindepth 1 -maxdepth 1 \
            -type d -name 'immortalwrt-sdk-*' -print -quit)"
          [[ -n "$sdk_root" ]]
          echo "SDK_ROOT=$sdk_root" >> "$GITHUB_ENV"

      - name: 确定滚动下载缓存版本
        id: cache
        run: echo "date=$(TZ=Asia/Shanghai date +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: 缓存软件包下载
        uses: actions/cache@main
        with:
          path: ~/.cache/immortalwrt-dl/${{ matrix.platform }}
          key: immortalwrt-dl-${{ matrix.platform }}-${{ steps.cache.outputs.date }}-${{ hashFiles('**/Makefile') }}
          restore-keys: |
            immortalwrt-dl-${{ matrix.platform }}-${{ steps.cache.outputs.date }}-
            immortalwrt-dl-${{ matrix.platform }}-

      - name: 准备软件包源
        run: |
          cache_dir="$HOME/.cache/immortalwrt-dl/${{ matrix.platform }}"
          mkdir -p "$cache_dir"
          rm -rf "$SDK_ROOT/dl"
          ln -s "$cache_dir" "$SDK_ROOT/dl"
          "$SDK_ROOT/scripts/feeds" update -a
          "$SDK_ROOT/scripts/feeds" install -a

      - name: 编译 ${{ matrix.platform_name }} APK
        env:
          PACKAGES: ${{ needs.resolve.outputs.packages }}
        run: |
          IFS=',' read -ra selected_packages <<< "$PACKAGES"
          .github/scripts/build-apk-packages.sh \
            "$SDK_ROOT" \
            "$RUNNER_TEMP/apk-output" \
            '${{ matrix.target }}' \
            '${{ matrix.subtarget }}' \
            "${selected_packages[@]}"

      - name: 上传 ${{ matrix.platform_name }} 编译结果
        uses: actions/upload-artifact@main
        with:
          name: apk-output-${{ matrix.platform }}
          path: ${{ runner.temp }}/apk-output
          if-no-files-found: error
          retention-days: 1

  publish:
    name: 发布 ${{ matrix.platform_name }} APK
    needs:
      - resolve
      - build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: arm64
            platform_name: ARM64
            architecture: aarch64
            sdk_target: qualcommax/ipq60xx
            release_tag: apk-packages-arm64
          - platform: amd64
            platform_name: AMD64
            architecture: x86_64
            sdk_target: x86/64
            release_tag: apk-packages-amd64
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ matrix.release_tag }}
      ARCHIVE_PREFIX: immortalwrt-apk-packages-${{ matrix.platform }}
    steps:
      - name: 检出软件包仓库
        uses: actions/checkout@main

      - name: 下载 ${{ matrix.platform_name }} 编译结果
        uses: actions/download-artifact@main
        with:
          name: apk-output-${{ matrix.platform }}
          path: ${{ runner.temp }}/apk-output

      - name: 确定 ZIP 发布号
        id: archive
        run: |
          build_date="$(TZ=Asia/Shanghai date +%Y%m%d)"
          release=1

          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            release_id="$(gh api \
              "repos/$GITHUB_REPOSITORY/releases/tags/$RELEASE_TAG" \
              --jq '.id')"
            while IFS= read -r name; do
              if [[ "$name" =~ ^${ARCHIVE_PREFIX}-${build_date}-r([0-9]+)\.zip$ ]] &&
                 (( BASH_REMATCH[1] >= release )); then
                release=$((BASH_REMATCH[1] + 1))
              fi
            done < <(
              gh api --paginate \
                "repos/$GITHUB_REPOSITORY/releases/$release_id/assets?per_page=100" \
                --jq '.[].name'
            )
          fi

          archive_name="${ARCHIVE_PREFIX}-${build_date}-r${release}.zip"
          {
            echo "build_date=$build_date"
            echo "release=$release"
            echo "archive_name=$archive_name"
          } >> "$GITHUB_OUTPUT"

      - name: 发布 ${{ matrix.platform_name }} APK
        env:
          PACKAGES_DISPLAY: ${{ needs.resolve.outputs.packages_display }}
          ARCHIVE_NAME: ${{ steps.archive.outputs.archive_name }}
        run: |
          output_dir="$RUNNER_TEMP/apk-output"
          notes_file="$RUNNER_TEMP/apk-release-notes.md"
          assets=()
          while IFS=$'\t' read -r filename _; do
            assets+=("$output_dir/$filename")
          done < "$output_dir/APK-MANIFEST.tsv"
          (( ${#assets[@]} > 0 ))

          {
            echo 'ImmortalWrt APK 软件包固定发布。'
            echo
            echo '平台：${{ matrix.platform_name }}'
            echo '架构：${{ matrix.architecture }}'
            echo 'SDK 目标：${{ matrix.sdk_target }}'
            echo "固定标签：$RELEASE_TAG"
            echo "本次编译：$PACKAGES_DISPLAY"
            echo "源提交：$GITHUB_SHA"
            echo "最新整合包：$ARCHIVE_NAME"
            echo
            echo '每个 APK 包名仅保留最近 3 个版本。'
            echo 'ZIP 仅包含本平台每个软件包的最新版本。'
          } > "$notes_file"

          if gh release view "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${assets[@]}" \
              --repo "$GITHUB_REPOSITORY" --clobber
            gh release edit "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title 'ImmortalWrt APK 软件包（${{ matrix.platform_name }}）' \
              --notes-file "$notes_file" \
              --prerelease=false
          else
            gh release create "$RELEASE_TAG" "${assets[@]}" \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title 'ImmortalWrt APK 软件包（${{ matrix.platform_name }}）' \
              --notes-file "$notes_file"
          fi

      - name: 每个软件包保留三个版本
        run: |
          .github/scripts/prune-apk-release.sh \
            "$RELEASE_TAG" 3 "$RUNNER_TEMP/latest-apk-assets.tsv"

      - name: 发布 ${{ matrix.platform_name }} 最新整合包
        env:
          ARCHIVE_NAME: ${{ steps.archive.outputs.archive_name }}
        run: |
          bundle_dir="$RUNNER_TEMP/all-apk-packages"
          archive="$RUNNER_TEMP/$ARCHIVE_NAME"
          rm -rf "$bundle_dir" "$archive"
          mkdir -p "$bundle_dir"

          while IFS=$'\t' read -r _ filename _ _; do
            gh release download "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --pattern "$filename" \
              --dir "$bundle_dir"
          done < "$RUNNER_TEMP/latest-apk-assets.tsv"

          mapfile -t apk_files < <(find "$bundle_dir" -maxdepth 1 -type f -name '*.apk')
          (( ${#apk_files[@]} > 0 ))
          (
            cd "$bundle_dir"
            sha256sum -- *.apk > SHA256SUMS
            zip -9 -q "$archive" -- *.apk SHA256SUMS
          )

          release_id="$(gh api \
            "repos/$GITHUB_REPOSITORY/releases/tags/$RELEASE_TAG" \
            --jq '.id')"
          while IFS=$'\t' read -r asset_id asset_name; do
            [[ "$asset_name" == "$ARCHIVE_PREFIX-"*.zip ]] || continue
            gh api --method DELETE \
              "repos/$GITHUB_REPOSITORY/releases/assets/$asset_id"
          done < <(
            gh api --paginate \
              "repos/$GITHUB_REPOSITORY/releases/$release_id/assets?per_page=100" \
              --jq '.[] | [.id, .name] | @tsv'
          )

          gh release upload "$RELEASE_TAG" "$archive" \
            --repo "$GITHUB_REPOSITORY"
          echo "### 已发布：$ARCHIVE_NAME" >> "$GITHUB_STEP_SUMMARY"

  cleanup:
    name: 清理旧版 APK 发布与标签
    needs: publish
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: 检出软件包仓库
        uses: actions/checkout@main

      - name: 删除旧 APK Release 和 Tag
        run: |
          source .github/scripts/ci-common.sh
          ci_delete_release_and_tag apk-packages
