name: 每日清理 CI 缓存与运行记录

on:
  workflow_dispatch:
  schedule:
    # Asia/Shanghai 09:15
    - cron: '15 1 * * *'

permissions:
  actions: write
  contents: read

concurrency:
  group: cleanup-ci-history
  cancel-in-progress: false

jobs:
  cleanup:
    name: 清理 CI 缓存与运行记录
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ github.token }}
      CACHE_RETENTION_DAYS: '3'
      CACHE_KEEP_PER_GROUP: '2'
      RUN_RETENTION_DAYS: '14'
      RUN_KEEP_PER_WORKFLOW: '10'
    steps:
      - name: 检出软件包仓库
        uses: actions/checkout@v4

      - name: 删除旧缓存与运行记录
        run: .github/scripts/cleanup-actions-storage.sh
