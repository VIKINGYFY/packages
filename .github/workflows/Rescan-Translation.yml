name: 每日维护插件说明、翻译与权限

on:
  workflow_dispatch:
  schedule:
    # 中国时间 02:10
    - cron: '10 18 * * *'

permissions:
  contents: write

concurrency:
  group: repository-maintenance
  cancel-in-progress: false

jobs:
  maintain:
    name: 维护插件说明、翻译与权限
    runs-on: ubuntu-latest
    steps:
      - name: 检出插件仓库
        uses: actions/checkout@main
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: 同步默认分支
        env:
          PACKAGE_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          source .github/scripts/ci-common.sh
          ci_sync_branch "$PACKAGE_BRANCH"

      - name: 安装翻译工具
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get -qq update
          sudo apt-get -qq install --no-install-recommends gettext

      - name: 维护插件说明、翻译与权限
        run: |
          .github/scripts/maintain-repository.sh
          .github/scripts/rescan-translations.sh
          git diff --check

      - name: 提交维护结果
        env:
          PACKAGE_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          source .github/scripts/ci-common.sh
          ci_commit_and_push \
            "$PACKAGE_BRANCH" \
            'chore: 维护插件说明、翻译与权限' \
            .
