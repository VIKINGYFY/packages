name: Maintain translations and permissions

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'luci-*/htdocs/**'
      - 'luci-*/luasrc/**'
      - 'luci-*/root/**'
      - '.github/scripts/fix-package-permissions.sh'
      - '.github/scripts/rescan-translations.sh'
      - '.github/workflows/Rescan-Translation.yml'

permissions:
  contents: write

concurrency:
  group: rescan-translations-${{ github.ref }}
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install translation tools
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get -qq update
          sudo apt-get -qq install --no-install-recommends gettext

      - name: Fix executable permissions
        run: .github/scripts/fix-package-permissions.sh

      - name: Rescan translations
        run: .github/scripts/rescan-translations.sh

      - name: Commit maintenance updates
        run: |
          git add -u -- .
          git diff --cached --quiet && exit 0

          changed_packages="$(git diff --cached --name-only | cut -d/ -f1 | grep '^luci-' | sort -u | paste -sd, -)"
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m "chore: maintain translations and permissions for ${changed_packages}"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
