name: Maintain translations and permissions

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: rescan-translations-${{ github.ref }}
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 使用远端分支重置本地仓库
        run: |
          git fetch origin "$GITHUB_REF_NAME"
          git reset --hard "origin/$GITHUB_REF_NAME"

      - name: Install translation tools
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get -qq update
          sudo apt-get -qq install --no-install-recommends gettext

      - name: Fix executable permissions
        run: .github/scripts/fix-package-permissions.sh

      - name: Rescan translations
        run: .github/scripts/rescan-translations.sh

      - name: Commit maintenance updates
        run: |
          git add -u -- .
          git diff --cached --quiet && exit 0

          changed_packages="$(git diff --cached --name-only | cut -d/ -f1 | sort -u | paste -sd, -)"
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m "维护翻译与权限：${changed_packages}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
