name: 每日检查并更新 HomeProxy 数据

on:
  workflow_dispatch:
  schedule:
    # 中国时间 02:40
    - cron: '40 18 * * *'

permissions:
  contents: write

concurrency:
  group: repository-maintenance
  cancel-in-progress: false

jobs:
  update:
    name: 检查并更新 HomeProxy 数据
    runs-on: ubuntu-latest
    steps:
      - name: 检出插件仓库
        uses: actions/checkout@main
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: 同步默认分支
        env:
          PACKAGE_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          source .github/scripts/ci-common.sh
          ci_sync_branch "$PACKAGE_BRANCH"

      - name: 安装数据更新工具
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get -qq update
          sudo apt-get -qq install --no-install-recommends curl jq unzip

      - name: 检查并更新 HomeProxy 数据
        id: resources
        run: .github/scripts/update-homeproxy-geodata.sh

      - name: 提交数据更新
        env:
          PACKAGE_BRANCH: ${{ github.event.repository.default_branch }}
          RESOURCE_VERSION: ${{ steps.resources.outputs.version }}
        run: |
          source .github/scripts/ci-common.sh
          ci_commit_and_push \
            "$PACKAGE_BRANCH" \
            "chore: 更新 HomeProxy 数据至 $RESOURCE_VERSION" \
            luci-app-homeproxy/root/etc/homeproxy/resources \
            luci-app-homeproxy/root/etc/homeproxy/dashboard
